<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rayjs (web)</title>
<style>
    html, body { margin: 0; padding: 0; background: #1a1a1a; color: #eee;
                 font-family: system-ui, sans-serif; height: 100%; }
    body { display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; gap: 1rem; }
    #canvas { background: #000; max-width: 100%; max-height: 90vh;
              outline: none; }
    #status { font-size: 0.9rem; opacity: 0.7; }
    #start { padding: 0.6em 1.2em; font-size: 1rem; cursor: pointer;
             background: #2a2a2a; color: #eee; border: 1px solid #444;
             border-radius: 4px; }
    #start:hover { background: #333; }
    #start[hidden] { display: none; }
    #games { display: flex; gap: 0.5rem; font-size: 0.85rem; }
    #games a { color: #9cf; text-decoration: none; padding: 0.2em 0.6em;
               border: 1px solid #444; border-radius: 3px; }
    #games a.active { background: #2a4a6a; border-color: #4a6a8a; color: #fff; }
    #games a:hover { background: #333; }
</style>
</head>
<body>
    <canvas id="canvas" width="800" height="450" tabindex="-1"></canvas>
    <div id="status">Loading rayjs runtime…</div>
    <button id="start" hidden>Click to start</button>
    <div id="games">
        <a href="?game=dino">dino_on_blocks</a>
        <a href="?game=platformer">platformer_scarfy (box2d)</a>
        <a href="?game=audio">audio_sound_loading</a>
    </div>
    <script>
        // Highlight whichever ?game=<name> is active so the user can see
        // which one is loaded (default: dino).
        const _g = new URLSearchParams(location.search).get("game") || "dino";
        for (const a of document.querySelectorAll("#games a")) {
            if (a.search === `?game=${_g}`) a.classList.add("active");
        }
    </script>

    <script src="loader.js"></script>
    <script src="rayjs.js"></script>
</body>
</html>
