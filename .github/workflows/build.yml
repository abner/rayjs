name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            archive: rayjs_windows_x64.zip
          - name: linux-x64
            os: ubuntu-latest
            archive: rayjs_linux_x64.tar.gz
          - name: macos-x64
            os: macos-13
            archive: rayjs_macos_x64.tar.gz
            osx_arch: x86_64
          - name: macos-arm64
            os: macos-latest
            archive: rayjs_macos_arm64.tar.gz
            osx_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies (Linux)
        if: matrix.name == 'linux-x64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglfw3 libglfw3-dev libx11-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev

      - name: Configure CMake (Windows)
        if: matrix.name == 'windows-x64'
        run: cmake -G "MinGW Makefiles" -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure CMake (Linux)
        if: matrix.name == 'linux-x64'
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure CMake (macOS)
        if: startsWith(matrix.name, 'macos')
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Package (Unix)
        if: matrix.name != 'windows-x64'
        run: |
          mkdir release
          cp ./examples/lib.raylib.d.ts ./release/
          cp ./main.js ./release/
          cp ./rayjs ./release/
          cp ./readme.md ./release/
          tar -czvf ${{ matrix.archive }} release

      - name: Package (Windows)
        if: matrix.name == 'windows-x64'
        shell: cmd
        run: |
          mkdir release
          copy /Y examples\lib.raylib.d.ts release\lib.raylib.d.ts
          copy /Y main.js release\main.js
          copy /Y rayjs.exe release\rayjs.exe
          copy /Y readme.md release\readme.md
          7z a ${{ matrix.archive }} release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
