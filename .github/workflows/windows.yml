name: Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: MinSizeRel

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: MinGW Winlibs
      uses: Denzy7/action-mingw@v0.1

    - name: Configure
      run: cmake -G "MinGW Makefiles" -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} -j

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rayjs-windows-x86_64
        path: rayjs.exe
